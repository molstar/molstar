<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
        <link rel="icon" href="./favicon.ico" type="image/x-icon">
        <title>Embedded Mol* Viewer</title>
        <style>
            #app {
                position: absolute;
                left: 100px;
                top: 100px;
                width: 800px;
                height: 600px;
            }
        </style>
        <link rel="stylesheet" type="text/css" href="molstar.css" />
    </head>
    <body>
        <div id="app"></div>
        <div>
            <button onclick="javascript:focusPair('MA', 1513, 'MA', 1478, true)">Pair 1</button>
            <button onclick="javascript:focusPair('MA', 1183, 'MA', 1166, true)">Pair 2</button>
            <button onclick="javascript:focusPair('OA', 118, 'OA', 288, true)">Pair 3</button>
        </div>
        <script type="text/javascript" src="./molstar.js"></script>
        <script type="text/javascript">
            function focusPair(ca, ra, cb, rb, opt) {
                const elements = {
                    items: [
                        { label_asym_id: ca, label_seq_id: ra },
                        { label_asym_id: cb, label_seq_id: rb }
                    ]
                }
                document.msViewer.structureInteractivity({
                    elements: elements,
                    action: ['focus', 'select'],
                    focusOptions: {
                        optimizeDirection: opt,
                        durationMs: 500,
                        extraRadius: -1,
                        minRadius: 5,
                        zoomOut: true
                    }
                });
            }


            molstar.Viewer.create('app', {
                layoutIsExpanded: false,
                layoutShowControls: false,
                layoutShowRemoteState: false,
                layoutShowSequence: true,
                layoutShowLog: false,
                layoutShowLeftPanel: true,

                viewportShowExpand: true,
                viewportShowSelectionMode: false,
                viewportShowAnimation: false,

                pdbProvider: 'rcsb',
                emdbProvider: 'rcsb',
            }).then(viewer => {
                document.msViewer = viewer;
                viewer.loadPdb('9rja');

                // viewer.loadPdb('7bv2');
                // viewer.loadEmdb('EMD-30210', { detail: 6 });
                // viewer.loadAllModelsOrAssemblyFromUrl('https://cs.litemol.org/5ire/full', 'mmcif', false, { representationParams: { theme: { globalName: 'operator-name' } } })
                // viewer.loadStructureFromUrl('my url', 'pdb', false, {
                //     representationParams: {
                //         theme: {
                //             globalName: 'uniform',
                //             globalColorParams: { value: 0xff0000 }
                //         }
                //     },
                //     label: 'my structure'
                // });
            });
        </script>
    </body>
</html>
